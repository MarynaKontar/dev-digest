# mcp suite — the DevDigest MCP server + pre-push review CLI (@devdigest/mcp).
# Typecheck + smoke tests (local working-tree helpers + shared contract barrel).
# Hermetic: the smoke test never imports server.ts (it self-connects over stdio).
# Uses pnpm (pnpm-lock.yaml).
name: mcp

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp.yml'
  pull_request:
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp.yml'

permissions:
  contents: read

concurrency:
  group: mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcp/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
